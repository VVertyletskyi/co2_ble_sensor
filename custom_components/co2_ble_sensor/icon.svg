<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="#1976D2"/>
  
  <!-- CO2 molecule circles -->
  <circle cx="72" cy="128" r="28" fill="none" stroke="white" stroke-width="8"/>
  <circle cx="128" cy="128" r="22" fill="white" opacity="0.9"/>
  <circle cx="184" cy="128" r="28" fill="none" stroke="white" stroke-width="8"/>
  
  <!-- Bond lines -->
  <line x1="100" y1="120" x2="106" y2="120" stroke="white" stroke-width="7"/>
  <line x1="100" y1="136" x2="106" y2="136" stroke="white" stroke-width="7"/>
  <line x1="150" y1="120" x2="156" y2="120" stroke="white" stroke-width="7"/>
  <line x1="150" y1="136" x2="156" y2="136" stroke="white" stroke-width="7"/>

  <!-- CO2 text -->
  <text x="128" y="200" font-family="Arial, sans-serif" font-size="32" font-weight="bold" 
        fill="white" text-anchor="middle">CO₂</text>
  
  <!-- BLE waves -->
  <path d="M 30 60 Q 50 40 70 60" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <path d="M 20 48 Q 50 18 80 48" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
</svg>
